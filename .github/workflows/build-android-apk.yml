name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug â€” show structure
        run: |
          echo "=== android-app root ==="
          ls -la android-app/
          echo ""
          echo "=== android-app/app ==="
          ls -la android-app/app/ 2>/dev/null || echo "No app/ folder"
          echo ""
          echo "=== android-app/app/src ==="
          ls -la android-app/app/src/ 2>/dev/null || echo "No src/ folder"
          echo ""
          echo "=== gradlew ==="
          ls -la android-app/gradlew 2>/dev/null || echo "gradlew NOT found"
          echo ""
          echo "=== gradle/wrapper ==="
          ls -la android-app/gradle/wrapper/ 2>/dev/null || echo "No gradle wrapper folder"

      - name: Copy index.html to assets
        run: |
          mkdir -p android-app/app/src/main/assets/www
          cp index.html android-app/app/src/main/assets/www/index.html
          echo "âœ… Copied index.html"

      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -100

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgefit-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
