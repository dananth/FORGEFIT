name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.10
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10-bin.zip
          unzip -q gradle-8.10-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.10/bin" >> $GITHUB_PATH

      - name: Copy index.html to assets
        run: |
          mkdir -p android-app/app/src/main/assets/www
          cp index.html android-app/app/src/main/assets/www/index.html
          echo "âœ… Copied index.html to assets"

      - name: Debug â€” show structure
        run: |
          echo "=== android-app/ ==="
          ls -la android-app/
          echo "=== android-app/app/ ==="
          ls -la android-app/app/ 2>/dev/null || echo "No app/ folder"
          echo "=== Gradle version ==="
          gradle --version

      - name: Build debug APK
        working-directory: android-app
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgefit-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
