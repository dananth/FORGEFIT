name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug â€” show android-app contents
        run: |
          echo "=== android-app root ==="
          ls -la android-app/
          echo ""
          echo "=== android-app/app ==="
          ls -la android-app/app/ 2>/dev/null || echo "No app/ folder found"
          echo ""
          echo "=== gradlew exists? ==="
          ls -la android-app/gradlew 2>/dev/null || echo "gradlew NOT found"
          echo ""
          echo "=== settings.gradle.kts ==="
          cat android-app/settings.gradle.kts 2>/dev/null || echo "Not found"
          echo ""
          echo "=== app/build.gradle.kts ==="
          cat android-app/app/build.gradle.kts 2>/dev/null || echo "Not found"

      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Sync web assets manually
        run: |
          mkdir -p android-app/app/src/main/assets/www
          cp index.html android-app/app/src/main/assets/www/index.html
          echo "Copied index.html to assets"
          ls -la android-app/app/src/main/assets/www/

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgefit-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
